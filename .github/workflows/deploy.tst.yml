name: Deploy Testing to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan 212.85.0.110 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          BUILD_DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/host\.docker\.internal/localhost/g')
          ssh deploy@212.85.0.110 "
            set -e

            # Set environment variables
            export DATABASE_URL='${{ secrets.DATABASE_URL }}'

            # General
            cd /opt/toongueseer
            git pull origin main
          
            # App
            cd /opt/toongueseer/frontend
            docker build --network=host --build-arg BUILD_DATABASE_URL=\"$BUILD_DATABASE_URL\" -t toonguesser:testing -f Dockerfile.tst .
            docker compose -f compose.tst.yaml up -d --remove-orphans --force-recreate

            # Cron
            cd /opt/toongueseer/cron
            docker build --network=host --build-arg BUILD_DATABASE_URL=\"$BUILD_DATABASE_URL\" -t toonguesser-cron:testing -f Dockerfile.tst .
            docker compose -f compose.tst.yaml up -d --remove-orphans --force-recreate

            # Cleanup
            docker image prune -f
          "