name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan 212.85.0.110 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh deploy@212.85.0.110 "
            set -e
          
            # App
            cd /opt/toongueseer/app
            npm install
            npm run build

            # Cron
            cd /opt/toongueseer/cron
            npm install
            npm run build

            # Restart apps
            pm2 restart toonguesser cron-toonguesser
            pm2 save
          "