services:
  toon:
    container_name: toon-tst
    image: toonguesser:testing
    entrypoint: ["./entrypoint.prd.sh"]
    environment:
      - NODE_ENV=testing
      - NEXT_PUBLIC_MAX_DIFFICULTY=7
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - toon-net-tst

networks:
  toon-net-tst:
    name: toon-net-tst